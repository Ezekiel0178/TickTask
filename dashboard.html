                    <div class="logoutButton">
                        <button class="logoutBtn"><i class="bi bi-box-arrow-right"></i><p>Logout</p></button>
                    </div>
                </div>
            </div>
        </div>
        <div class="content">
            <div class="sub-content">
                <div class="dashboard">
                    <h2> <span class="name"></span></h2>
                    <p>Your task board is empty. Let's add something!</p>
                </div>
                <div class="card-wrapper">
                    <div class="card">
                        <div class="sub-card">
                            <div class="iconCon iconCon1"><i class="bi bi-list-check"></i></div>
                            <span class="number">0</span>
                            <p>Total Tasks</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="sub-card">
                            <div class="iconCon iconCon2"><i class="bi bi-check2"></i></div>
                            <span class="number number2">0</span>
                            <p>Completed</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="sub-card">
                            <div class="iconCon iconCon3"><i class="bi bi-clock"></i></div>
                            <span class="number">0</span>
                            <p>Pending</p>
                        </div>
                    </div>
                </div>

                <div class="progressBar">
                    <div class="progressTitle">
                        <div class="title">
                            <i class="bi bi-graph-up"></i>
                            <p>Progress</p>
                        </div>
                        <div class="value">0%</div>
                    </div>

                    <input type="range" id="progress" min="0" max="100" value="0">
                </div>

                <div class="taskAdder">
                    <div class="input-field">
                        <i class="bi bi-stars"></i>
                        <input type="text" placeholder="what needs to be done today?">
                    </div>
                    <button><i class="bi bi-plus-lg"></i> <span class="buttonText">Add task</span></button>
                </div>

                <div class="tasksList"></div>

                <div class="emptyMessage">
                    <div class="sub-emptyMessage">
                        <div class="sub-box-icon reasonIcon emptyMessageicon">
                            <i class="bi bi-list-check"></i>
                        </div>
                        <h3>No tasks yet</h3>
                        <p>Type something above and press Enter or click <br>
                            Add Task to get started!
                        </p>
                    </div>
                </div>

                <div class="footer">
                    <p>✔ Tick it. Track it. Get it done.</p>
                </div>
            </div>
        </div>
        
        <script src="auth.js"></script>
        <script src="dashboard.js"></script>
        <script src="task.js"></script>
